name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: 24
          cache: npm

      - name: Setup Deno
        uses: denoland/setup-deno@e95548e56dfa95d4e1a28d6f422fafe75c4c26fb # v2
        with:
          deno-version: v2.x

      - name: Setup Bun
        uses: oven-sh/setup-bun@3d267786b128fe76c2f16a390aa2448b815359f3 # v2

      - name: Install
        run: npm ci

      - name: Dependency freshness check
        run: npm run deps:freshness

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Quality gates
        run: npm run lint && npm run typecheck && npm test && npm run smoke:all && npm run smoke:browser && npm run eval:release

      - name: npm pack dry-run
        run: npm pack --dry-run

      - name: Publish npm (optional)
        if: ${{ secrets.NPM_TOKEN != '' }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --provenance --access public

      - name: Publish JSR (optional)
        if: ${{ secrets.JSR_TOKEN != '' }}
        env:
          JSR_TOKEN: ${{ secrets.JSR_TOKEN }}
        run: npx -y jsr publish
