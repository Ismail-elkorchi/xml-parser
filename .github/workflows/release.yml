name: Release Notes

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      from_tag:
        description: "Optional lower-bound tag (defaults to latest reachable tag)"
        required: false
        type: string
      to_ref:
        description: "Upper-bound ref for notes/changelog generation"
        required: false
        default: HEAD
        type: string
      dry_run:
        description: "Preview changelog update without file mutation"
        required: true
        default: true
        type: boolean

permissions:
  contents: read
  pull-requests: read

jobs:
  release-notes:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || (inputs.to_ref != 'HEAD' && inputs.to_ref || github.ref_name) }}
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Resolve release-note range
        id: range
        env:
          INPUT_FROM_TAG: ${{ inputs.from_tag }}
          INPUT_TO_REF: ${{ inputs.to_ref }}
        run: |
          set -euo pipefail

          from_tag="${INPUT_FROM_TAG}"
          to_ref="${INPUT_TO_REF}"

          if [ "${GITHUB_EVENT_NAME}" = "release" ]; then
            to_ref="${{ github.event.release.tag_name }}"
          fi

          if [ -z "${to_ref}" ]; then
            to_ref="HEAD"
          fi

          {
            echo "from_tag=${from_tag}"
            echo "to_ref=${to_ref}"
          } >> "${GITHUB_OUTPUT}"

      - name: Render release notes
        run: |
          set -euo pipefail
          mkdir -p release-artifacts
          args=(--to-ref "${{ steps.range.outputs.to_ref }}")
          if [ -n "${{ steps.range.outputs.from_tag }}" ]; then
            args+=(--from-tag "${{ steps.range.outputs.from_tag }}")
          fi

          node scripts/release/render-notes.mjs "${args[@]}" > release-artifacts/release-notes.md

      - name: Update changelog (preview or write)
        env:
          DRY_RUN: ${{ github.event_name == 'release' && 'true' || inputs.dry_run }}
        run: |
          set -euo pipefail
          args=(--to-ref "${{ steps.range.outputs.to_ref }}")
          if [ -n "${{ steps.range.outputs.from_tag }}" ]; then
            args+=(--from-tag "${{ steps.range.outputs.from_tag }}")
          fi

          if [ "${DRY_RUN}" = "true" ]; then
            node scripts/release/update-changelog.mjs "${args[@]}" --dry-run > release-artifacts/changelog-preview.md
          else
            node scripts/release/update-changelog.mjs "${args[@]}"
            git diff -- CHANGELOG.md > release-artifacts/changelog-preview.md
          fi

      - name: Upload release-note artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-notes-${{ github.run_id }}
          path: release-artifacts/

  publish-release-notes:
    if: ${{ github.event_name == 'release' }}
    needs: release-notes
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Download release-note artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-notes-${{ github.run_id }}
          path: release-artifacts

      - name: Apply release notes to published release
        run: gh release edit "${{ github.event.release.tag_name }}" --notes-file release-artifacts/release-notes.md
