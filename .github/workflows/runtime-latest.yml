name: Runtime Latest (Non-blocking)

on:
  schedule:
    - cron: "11 4 * * 2"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: runtime-latest-${{ github.ref }}
  cancel-in-progress: true

jobs:
  latest-runtime-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup Node (latest stable)
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: current
          cache: npm

      - name: Setup Deno (latest stable)
        uses: denoland/setup-deno@22d081ff2d3a40755e97629de92e3bcbfa7cf2ed # v2.0.5
        with:
          deno-version: latest

      - name: Setup Bun (latest stable)
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest

      - name: Install
        run: npm ci

      - name: Dependency freshness check
        run: npm run deps:freshness

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Runtime smoke matrix
        run: npm run smoke:all

      - name: Eval CI
        run: npm run eval:ci
