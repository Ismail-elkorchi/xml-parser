name: Release Audit

on:
  workflow_dispatch:
  schedule:
    - cron: "29 4 * * 1"

permissions:
  contents: read

jobs:
  release-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm

      - name: Setup Deno
        uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2
        with:
          deno-version: v2.x

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - name: Install
        run: npm ci

      - name: Dependency freshness check
        run: npm run deps:freshness

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Evaluate release profile
        run: npm run eval:release

      - name: npm pack dry-run
        run: npm pack --dry-run

      - name: JSR dry-run
        run: npx -y jsr publish --dry-run --allow-dirty
