name: Release Audit

on:
  workflow_dispatch:
  schedule:
    - cron: "29 4 * * 1"

permissions:
  contents: read

jobs:
  release-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 24
          cache: npm

      - name: Setup Deno
        uses: denoland/setup-deno@e95548e56dfa95d4e1a28d6f422fafe75c4c26fb # v2
        with:
          deno-version: v2.x

      - name: Setup Bun
        uses: oven-sh/setup-bun@ecf28ddc73e819eb6fa29df6b34ef8921c743461 # v2

      - name: Install
        run: npm ci

      - name: Dependency freshness check
        run: npm run deps:freshness

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Evaluate release profile
        run: npm run eval:release

      - name: npm pack dry-run
        run: npm pack --dry-run

      - name: JSR dry-run
        run: npx -y jsr publish --dry-run --allow-dirty
