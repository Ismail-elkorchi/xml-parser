name: Publish

on:
  release:
    types: [published]

concurrency:
  group: publish-${{ github.event.release.tag_name }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout release tag
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ github.event.release.tag_name }}
          fetch-depth: 0
      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm
      - name: Setup Deno
        uses: denoland/setup-deno@22d081ff2d3a40755e97629de92e3bcbfa7cf2ed # v2.0.5
        with:
          deno-version: v2.x
      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
      - name: Validate release source
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          package_version="$(node -p 'require("./package.json").version')"
          jsr_version="$(node -p 'require("./jsr.json").version')"
          test "${package_version}" = "${jsr_version}"
          test "${RELEASE_TAG}" = "v${package_version}"
          test "$(git rev-list -n 1 "${RELEASE_TAG}")" = "$(git rev-parse HEAD)"
          git fetch origin main
          git merge-base --is-ancestor HEAD origin/main
      - name: Install
        run: npm ci
      - name: Install Chromium
        run: npx playwright install --with-deps chromium
      - name: Qualify release source
        run: npm run qualification:release
      - name: Verify clean qualified source
        run: git diff --exit-code
      - name: Verify JSR package
        run: deno publish --dry-run
      - name: Build npm publication artifact
        id: pack
        run: |
          set -euo pipefail
          pack_json="$(npm pack --json)"
          tarball="$(printf '%s' "${pack_json}" | node -e 'let value="";process.stdin.on("data",chunk=>value+=chunk).on("end",()=>process.stdout.write(JSON.parse(value)[0].filename))')"
          echo "tarball=${tarball}" >> "${GITHUB_OUTPUT}"
      - name: Publish to JSR
        run: deno publish
      - name: Publish exact npm artifact
        env:
          NPM_CONFIG_PROVENANCE: true
        run: npm publish "${{ steps.pack.outputs.tarball }}" --access public --provenance
