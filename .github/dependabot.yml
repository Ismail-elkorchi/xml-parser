version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "05:00"
      timezone: "Africa/Casablanca"
    open-pull-requests-limit: 2
    labels:
      - dependencies
      - security
    groups:
      npm-minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
      day: monday
      time: "06:00"
      timezone: "Africa/Casablanca"
    open-pull-requests-limit: 1
    labels:
      - dependencies
      - security
    groups:
      actions-monthly:
        patterns:
          - "*"
